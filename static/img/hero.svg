<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 290">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <!-- Card back (red) -->
    <linearGradient id="cRed" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
    <!-- Probability bars -->
    <linearGradient id="bG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4ade80"/><stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bO" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="bR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/><stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <!-- Card shadow -->
    <filter id="cs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#00000033"/>
    </filter>
    <!-- Glow for front card -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#FFD70066"/>
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- ===== Background ===== -->
  <rect width="520" height="290" fill="url(#bg)" rx="18"/>

  <!-- Decorative dots (top area) -->
  <circle cx="60" cy="40" r="3.5" fill="#6366f1" opacity="0.3"/>
  <circle cx="80" cy="25" r="2" fill="#6366f1" opacity="0.2"/>
  <circle cx="460" cy="30" r="3" fill="#6366f1" opacity="0.3"/>
  <circle cx="480" cy="50" r="2" fill="#6366f1" opacity="0.2"/>
  <circle cx="40" cy="200" r="2.5" fill="#6366f1" opacity="0.2"/>
  <circle cx="490" cy="190" r="2" fill="#6366f1" opacity="0.2"/>

  <!-- ===== Gold Stars ===== -->
  <!-- Star: 8-point via two overlaid squares -->
  <g transform="translate(52,58) rotate(0) scale(1)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#FBBF24" opacity="0.9"/>
  </g>
  <g transform="translate(468,42) scale(0.8)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#FBBF24" opacity="0.8"/>
  </g>
  <g transform="translate(405,215) scale(0.65)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#FBBF24" opacity="0.75"/>
  </g>
  <g transform="translate(100,240) scale(0.6)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#FBBF24" opacity="0.65"/>
  </g>
  <g transform="translate(490,155) scale(0.5)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#FBBF24" opacity="0.6"/>
  </g>
  <!-- Tiny dots -->
  <circle cx="260" cy="18" r="2.5" fill="#FBBF24" opacity="0.5"/>
  <circle cx="30" cy="130" r="2" fill="#FBBF24" opacity="0.45"/>
  <circle cx="500" cy="240" r="2" fill="#FBBF24" opacity="0.4"/>

  <!-- ===== CARD FAN — pivot at (215, 165) ===== -->
  <!-- Drawing order: outermost first → center last (to get correct z-order) -->

  <!-- Card back "macro":
       rect x=-31 y=-44 w=62 h=88 rx=6
       Red body, pokeball, gold border -->

  <!-- ── Card A: -28° ── -->
  <g transform="translate(215,165) rotate(-28)" filter="url(#cs)">
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="url(#cRed)"/>
    <!-- top half darker -->
    <rect x="-29" y="-42" width="58" height="40" rx="4" fill="#dc2626" opacity="0.6"/>
    <!-- bottom white half -->
    <rect x="-29" y="-3"  width="58" height="44" rx="4" fill="#f5f5f5"/>
    <!-- pokeball ring -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <!-- center button -->
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#dc2626"/>
    <!-- gold outline -->
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ── Card E: +28° ── -->
  <g transform="translate(215,165) rotate(28)" filter="url(#cs)">
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="url(#cRed)"/>
    <rect x="-29" y="-42" width="58" height="40" rx="4" fill="#dc2626" opacity="0.6"/>
    <rect x="-29" y="-3"  width="58" height="44" rx="4" fill="#f5f5f5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#dc2626"/>
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ── Card B: -14° ── -->
  <g transform="translate(215,165) rotate(-14)" filter="url(#cs)">
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="url(#cRed)"/>
    <rect x="-29" y="-42" width="58" height="40" rx="4" fill="#dc2626" opacity="0.6"/>
    <rect x="-29" y="-3"  width="58" height="44" rx="4" fill="#f5f5f5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#dc2626"/>
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ── Card D: +14° ── -->
  <g transform="translate(215,165) rotate(14)" filter="url(#cs)">
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="url(#cRed)"/>
    <rect x="-29" y="-42" width="58" height="40" rx="4" fill="#dc2626" opacity="0.6"/>
    <rect x="-29" y="-3"  width="58" height="44" rx="4" fill="#f5f5f5"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <line x1="-18" y1="0" x2="18" y2="0" stroke="white" stroke-width="2.5" opacity="0.85"/>
    <circle cx="0" cy="0" r="5" fill="white"/>
    <circle cx="0" cy="0" r="3" fill="#dc2626"/>
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="none" stroke="#FBBF24" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ── Card C: 0° — FRONT card with probability chart ── -->
  <g transform="translate(215,165) rotate(0)" filter="url(#glow)">
    <!-- Card body (cream/white) -->
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="#fffef7" stroke="#FBBF24" stroke-width="2.5"/>
    <!-- Gold header -->
    <rect x="-31" y="-44" width="62" height="17" rx="6" fill="#FBBF24"/>
    <rect x="-31" y="-36" width="62" height="9"  fill="#FBBF24"/>
    <text x="0" y="-31" text-anchor="middle"
          font-family="'Noto Sans JP',Arial,sans-serif" font-size="6.5"
          font-weight="900" fill="#1a202c">確率計算</text>

    <!-- Divider -->
    <line x1="-26" y1="-26" x2="26" y2="-26" stroke="#e2e8f0" stroke-width="1"/>

    <!-- Bar row 1: T1 -->
    <text x="-26" y="-14" font-family="Arial,sans-serif" font-size="5.5" fill="#6b7280">T1</text>
    <rect x="-16" y="-22" width="36" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="-16" y="-22" width="30" height="7" rx="2" fill="url(#bG)"/>
    <text x="23"  y="-16" font-family="Arial,sans-serif" font-size="5" font-weight="700" fill="#15803d">83%</text>

    <!-- Bar row 2: T2 -->
    <text x="-26" y="-3"  font-family="Arial,sans-serif" font-size="5.5" fill="#6b7280">T2</text>
    <rect x="-16" y="-11" width="36" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="-16" y="-11" width="22" height="7" rx="2" fill="url(#bO)"/>
    <text x="23"  y="-5"  font-family="Arial,sans-serif" font-size="5" font-weight="700" fill="#c2410c">61%</text>

    <!-- Bar row 3: T3 -->
    <text x="-26" y="8"   font-family="Arial,sans-serif" font-size="5.5" fill="#6b7280">T3</text>
    <rect x="-16" y="0"   width="36" height="7" rx="2" fill="#e2e8f0"/>
    <rect x="-16" y="0"   width="15" height="7" rx="2" fill="url(#bR)"/>
    <text x="23"  y="6"   font-family="Arial,sans-serif" font-size="5" font-weight="700" fill="#b91c1c">42%</text>

    <!-- Icon area -->
    <rect x="-24" y="13" width="48" height="26" rx="5" fill="#eef2ff"/>
    <text x="0" y="31" text-anchor="middle" font-size="18">🎴</text>

    <!-- Gold border (on top) -->
    <rect x="-31" y="-44" width="62" height="88" rx="6" fill="none" stroke="#FBBF24" stroke-width="2.5"/>
  </g>

  <!-- ===== RIGHT SIDE TEXT ===== -->
  <text x="370" y="105" font-family="'Noto Sans JP',Arial,sans-serif"
        font-size="28" font-weight="900" fill="#1e1b4b" opacity="0.9">ポケカ</text>
  <text x="370" y="140" font-family="'Noto Sans JP',Arial,sans-serif"
        font-size="28" font-weight="900" fill="#1e1b4b" opacity="0.9">確率計算</text>

  <!-- Subtitle underline bar -->
  <rect x="370" y="148" width="130" height="4" rx="2" fill="#FBBF24"/>

  <text x="370" y="170" font-family="'Noto Sans JP',Arial,sans-serif"
        font-size="11" fill="#4338ca" opacity="0.85">デッキを登録して</text>
  <text x="370" y="185" font-family="'Noto Sans JP',Arial,sans-serif"
        font-size="11" fill="#4338ca" opacity="0.85">引ける確率を調べよう！</text>

  <!-- Feature pills -->
  <rect x="370" y="198" width="74" height="18" rx="9" fill="#4f46e5" opacity="0.15"/>
  <text x="407" y="211" text-anchor="middle"
        font-family="'Noto Sans JP',Arial,sans-serif" font-size="9" fill="#3730a3">📊 確率計算</text>

  <rect x="452" y="198" width="60" height="18" rx="9" fill="#4f46e5" opacity="0.15"/>
  <text x="482" y="211" text-anchor="middle"
        font-family="'Noto Sans JP',Arial,sans-serif" font-size="9" fill="#3730a3">🃏 デッキ管理</text>

  <rect x="370" y="222" width="72" height="18" rx="9" fill="#4f46e5" opacity="0.15"/>
  <text x="406" y="235" text-anchor="middle"
        font-family="'Noto Sans JP',Arial,sans-serif" font-size="9" fill="#3730a3">📈 ターン別分析</text>
</svg>
